apiVersion: apps/v1
kind: Deployment
metadata:
  name: review
  namespace: jobapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: review
  template:
    metadata:
      labels:
        app: review
    spec:
      initContainers:
        - name: wait-config
          image: busybox
          command: ['sh','-c','until wget -qO- http://config-server/actuator/health; do sleep 5; done']

        - name: wait-postgres
          image: busybox
          command: [ 'sh','-c','until nc -z postgres-postgresql 5432; do sleep 5; done' ]

        - name: wait-kafka
          image: busybox
          command: [ 'sh','-c','until nc -z kafka-broker 9092; do sleep 5; done' ]
      containers:
        - name: review
          image: {{ .Values.review.image }}
          ports:
            - containerPort: {{ .Values.review.port }}
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: k8s,gitk8s
---
apiVersion: v1
kind: Service
metadata:
  name: review-service
  namespace: jobapp
  labels:
    app: review
    application: review-service
spec:
  type: NodePort
  ports:
    - name: http
      port: 80
      targetPort: {{ .Values.review.port }}
  selector:
    app: review