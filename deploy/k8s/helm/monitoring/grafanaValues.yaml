grafana:
  additionalDataSources:
    - name: Loki
      type: loki
      url: http://loki:3100
      isDefault: false
    - name: Zipkin
      type: zipkin
      url: http://zipkin:9411
      isDefault: false
  resources:
    requests:
      memory: 256Mi
    limits:
      memory: 512Mi
  env:
    GF_AUTH_ANONYMOUS_ENABLED: true
    GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    GF_AUTH_BASIC_ENABLED: false

prometheus:
  prometheusSpec:
    retention: 6h
    resources:
      requests:
        memory: 512Mi
      limits:
        memory: 1Gi
